# =============================================================================
# Docker Compose: Spring Boot 앱 (홈페이지 시스템, REST 기반, H2 인메모리)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # 애플리케이션 서비스
  # ---------------------------------------------------------------------------
  app:
    build: .
    container_name: homepage-app
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  # ---------------------------------------------------------------------------
  # 데이터베이스 서비스 (H2 인메모리)
  # ---------------------------------------------------------------------------
  # 홈페이지 시스템은 H2 인메모리 DB를 사용하므로 별도 DB 컨테이너가 불필요하다.
  # 운영 환경에서 Oracle 또는 다른 DB로 전환 시 application-docker.yml 프로파일을 추가하면 된다.
